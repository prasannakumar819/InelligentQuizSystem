<!DOCTYPE html>
<html>
<head>
  <title>Setup Quiz</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', sans-serif;
    }

    body {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #ff9a9e, #fad0c4);
    }

    .setup-container {
      background: white;
      padding: 40px;
      width: 400px;
      border-radius: 18px;
      box-shadow: 0 20px 45px rgba(0,0,0,0.2);
      animation: fadeIn 0.6s ease-in-out;
    }

    .setup-container h2 {
      text-align: center;
      margin-bottom: 30px;
      color: #333;
    }

    .form-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      margin-bottom: 6px;
      font-size: 14px;
      color: #555;
    }

    input, select {
      width: 100%;
      padding: 10px;
      border-radius: 10px;
      border: 1px solid #ccc;
      outline: none;
      font-size: 14px;
      transition: 0.3s;
    }

    input:focus, select:focus {
      border-color: #ff758c;
      box-shadow: 0 0 8px rgba(255, 117, 140, 0.4);
    }

    button {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      font-weight: bold;
      color: white;
      background: linear-gradient(135deg, #ff758c, #ff7eb3);
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      transform: translateY(-3px);
      opacity: 0.95;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

  </style>
</head>
<body>

  <div class="setup-container">
    <h2>⚙️ Setup Your Quiz</h2>

    <form method="POST">

      <div class="form-group">
        <label>Number of Questions</label>
        <input type="number" name="num_questions" min="1" required>
      </div>

      <div class="form-group">
        <label>Difficulty Level</label>
        <select name="difficulty">
          <option value="easy">🌱 Easy</option>
          <option value="medium">🔥 Medium</option>
          <option value="hard">💀 Hard</option>
        </select>
      </div>

      <button type="submit">Generate Quiz 🚀</button>

    </form>
  </div>

</body>
</html>
